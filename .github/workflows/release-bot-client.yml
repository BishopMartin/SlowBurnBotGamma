# Release workflow — triggered by pushing a tag matching bot-client-v*.
# Builds a generic Windows EXE (PyInstaller) and Linux Docker image (Nuitka),
# uploads the EXE to Railway object storage, and pushes the Docker image to GHCR.
#
# No customer-specific data is baked in. Activation happens at runtime via
# the /bot/desktop/activate endpoint.
#
# Required repository secrets:
#   BUCKET_ENDPOINT_URL        — Railway S3-compatible bucket endpoint URL
#   BUCKET_NAME                — bucket name
#   BUCKET_ACCESS_KEY_ID       — bucket access key
#   BUCKET_SECRET_ACCESS_KEY   — bucket secret key
#   BUCKET_REGION              — bucket region (default: us-east-1)
#
# GITHUB_TOKEN is used automatically for GHCR push (read/write packages permission required).
#
# Artifact retention: after each build, old versioned EXEs beyond the 5 most recent
# are deleted from S3, and old GHCR package versions beyond 5 are pruned.

name: release-bot-client

on:
  push:
    tags:
      - "bot-client-v*"

permissions:
  contents: read
  packages: write  # push to GHCR and prune old versions

jobs:
  # ──────────────────────────────────────────────────────────────
  # Windows EXE build
  # ──────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read BOT_VERSION
        id: ver
        shell: bash
        run: |
          BOT_VERSION=$(python -c "import re; m=re.search(r'BOT_VERSION\s*=\s*[\"\']([\d.]+)[\"\']', open('bot-client/burnBot_version.py').read()); print(m.group(1) if m else 'unknown')")
          echo "bot_version=${BOT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "BOT_VERSION=${BOT_VERSION}"

      - name: Install dependencies
        run: pip install -r bot-client/requirements.txt pyinstaller

      - name: Build EXE
        working-directory: bot-client
        run: pyinstaller SlowBurnBot.spec --distpath ../dist --workpath ../build

      - name: Upload EXE to object storage
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BUCKET_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.BUCKET_REGION }}
          ENDPOINT_URL: ${{ secrets.BUCKET_ENDPOINT_URL }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          BOT_VERSION: ${{ steps.ver.outputs.bot_version }}
        run: |
          pip install awscli
          aws s3 cp dist/SlowBurnBot.exe "s3://${BUCKET_NAME}/releases/windows/SlowBurnBot-${BOT_VERSION}.exe" --endpoint-url "${ENDPOINT_URL}" --region "${AWS_DEFAULT_REGION}"
          aws s3 cp dist/SlowBurnBot.exe "s3://${BUCKET_NAME}/releases/windows/SlowBurnBot-latest.exe" --endpoint-url "${ENDPOINT_URL}" --region "${AWS_DEFAULT_REGION}"
          echo "Uploaded SlowBurnBot-${BOT_VERSION}.exe"

      - name: Prune old EXEs from object storage (keep 5)
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BUCKET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BUCKET_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.BUCKET_REGION }}
          ENDPOINT_URL: ${{ secrets.BUCKET_ENDPOINT_URL }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
        run: |
          KEEP=5
          # List all versioned EXEs sorted oldest-first, skip the two fixed keys (latest / legacy)
          ALL=$(aws s3 ls "s3://${BUCKET_NAME}/releases/windows/" \
            --endpoint-url "${ENDPOINT_URL}" --region "${AWS_DEFAULT_REGION}" \
            | awk '{print $4}' \
            | grep -E '^SlowBurnBot-[0-9]+\.[0-9]+\.exe$' \
            | sort)
          TOTAL=$(echo "$ALL" | grep -c .)
          DELETE_COUNT=$(( TOTAL - KEEP ))
          if [ "$DELETE_COUNT" -le 0 ]; then
            echo "Only ${TOTAL} versioned EXE(s) present — nothing to prune."
            exit 0
          fi
          echo "$ALL" | head -n "$DELETE_COUNT" | while read -r KEY; do
            echo "Deleting s3://${BUCKET_NAME}/releases/windows/${KEY}"
            aws s3 rm "s3://${BUCKET_NAME}/releases/windows/${KEY}" \
              --endpoint-url "${ENDPOINT_URL}" --region "${AWS_DEFAULT_REGION}"
          done

  # ──────────────────────────────────────────────────────────────
  # Linux Docker image build
  # ──────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read BOT_VERSION
        id: ver
        run: |
          BOT_VERSION=$(python3 -c "import re; m=re.search(r'BOT_VERSION\s*=\s*[\"\']([\d.]+)[\"\']', open('bot-client/burnBot_version.py').read()); print(m.group(1) if m else 'unknown')")
          echo "bot_version=${BOT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          pip install -r bot-client/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: bot-client
        run: |
          pyinstaller SlowBurnBot.linux.spec --distpath ../dist --workpath ../build
          cp ../dist/slowburnbot .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          BOT_VERSION: ${{ steps.ver.outputs.bot_version }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_VERSION="ghcr.io/${REPO_LOWER}/slowburnbot-client:${BOT_VERSION}"
          IMAGE_LATEST="ghcr.io/${REPO_LOWER}/slowburnbot-client:latest"
          cp bot-client/slowburnbot .
          docker build -f bot-client/Dockerfile.linux \
            -t "${IMAGE_VERSION}" \
            -t "${IMAGE_LATEST}" \
            .
          docker push "${IMAGE_VERSION}"
          docker push "${IMAGE_LATEST}"
          echo "Pushed ${IMAGE_VERSION} and ${IMAGE_LATEST}"

      - name: Prune old GHCR versions (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: slowburnbot-client
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: "^latest$"
