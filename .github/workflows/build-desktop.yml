# Desktop build workflow — triggered by the SlowBurnBot backend via workflow_dispatch.
#
# Required repository secrets (set in GitHub → Settings → Secrets):
#   (none — artifact upload uses GITHUB_TOKEN automatically; bot-client is in this repo)
#
# The backend PAT (GITHUB_TOKEN in Railway) is never exposed here.

name: build-desktop
run-name: build-${{ inputs.build_id }}

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "UUID of the desktop_builds row"
        required: true
      user_id:
        description: "UUID of the user"
        required: true
      client_id:
        description: "Integer client_id baked into the EXE"
        required: true
      api_url:
        description: "Backend API base URL (e.g. https://api.example.com)"
        required: true
      activation_token:
        description: "One-time activation token baked into the EXE"
        required: true
      config_json_b64:
        description: "Base64-encoded JSON of DesktopBuildConfig"
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout SlowBurnBotGamma
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r bot-client/requirements.txt pyinstaller

      - name: Materialize baked config module
        shell: python
        run: |
          import base64, json, pathlib, textwrap

          cfg = json.loads(base64.b64decode("${{ inputs.config_json_b64 }}").decode())

          module_lines = [
              "# AUTO-GENERATED by GitHub Actions — do not edit",
              f'BUILD_ID = "{{}}"'.format("${{ inputs.build_id }}"),
              f'USER_ID = "{{}}"'.format("${{ inputs.user_id }}"),
              f'CLIENT_ID = {{}}'.format("${{ inputs.client_id }}"),
              f'API_URL = "{{}}"'.format("${{ inputs.api_url }}"),
              f'ACTIVATION_TOKEN = "{{}}"'.format("${{ inputs.activation_token }}"),
              f'CONFIG = {{}}'.format(repr(cfg)),
          ]
          content = "\n".join(module_lines) + "\n"
          pathlib.Path("bot-client/_desktop_build_config.py").write_text(content)
          print("Wrote bot-client/_desktop_build_config.py")

      - name: Build EXE with PyInstaller
        working-directory: bot-client
        run: pyinstaller SlowBurnBot.spec --distpath ../dist --workpath ../build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlowBurnBot.exe
          path: dist/SlowBurnBot.exe
          retention-days: 90
          if-no-files-found: error
