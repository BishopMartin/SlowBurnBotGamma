# Linux Docker build workflow — triggered by the SlowBurnBot backend via workflow_dispatch.
#
# Required repository permissions (set in GitHub → Settings → Actions → Workflow permissions):
#   Read and write permissions (for GITHUB_TOKEN to push to GHCR)
#
# The backend PAT (GITHUB_TOKEN in Railway) is never exposed here.

name: build-linux
run-name: build-${{ inputs.build_id }}

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "UUID of the desktop_builds row"
        required: true
      user_id:
        description: "UUID of the user"
        required: true
      client_id:
        description: "Integer client_id baked into the binary"
        required: true
      api_url:
        description: "Backend API base URL (e.g. https://api.example.com)"
        required: true
      activation_token:
        description: "One-time activation token baked into the binary"
        required: true
      config_json_b64:
        description: "Base64-encoded JSON of DesktopBuildConfig"
        required: true

permissions:
  contents: read
  packages: write  # push image to GHCR

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SlowBurnBotGamma
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + Nuitka
        run: |
          pip install -r bot-client/requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Materialize baked config module
        shell: python
        run: |
          import base64, json, pathlib

          cfg = json.loads(base64.b64decode("${{ inputs.config_json_b64 }}").decode())

          module_lines = [
              "# AUTO-GENERATED by GitHub Actions — do not edit",
              f'BUILD_ID = "{{}}"'.format("${{ inputs.build_id }}"),
              f'USER_ID = "{{}}"'.format("${{ inputs.user_id }}"),
              f'CLIENT_ID = {{}}'.format("${{ inputs.client_id }}"),
              f'API_URL = "{{}}"'.format("${{ inputs.api_url }}"),
              f'ACTIVATION_TOKEN = "{{}}"'.format("${{ inputs.activation_token }}"),
              f'CONFIG = {{}}'.format(repr(cfg)),
          ]
          content = "\n".join(module_lines) + "\n"
          pathlib.Path("bot-client/_desktop_build_config.py").write_text(content)
          print("Wrote bot-client/_desktop_build_config.py")

      - name: Compile with Nuitka
        working-directory: bot-client
        run: |
          python -m nuitka \
            --onefile \
            --output-filename=slowburnbot \
            --include-module=_desktop_build_config \
            --nofollow-import-to=pyautogui,pygetwindow \
            burnBot.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}/slowburnbot-client:${{ inputs.build_id }}"
          cp bot-client/slowburnbot .
          docker build -f bot-client/Dockerfile.linux -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "image_ref=${IMAGE}" >> "$GITHUB_OUTPUT"
          printf 'image_ref=%s\npull_cmd=docker pull %s\nrun_cmd=docker run -it --rm %s\n' \
            "${IMAGE}" "${IMAGE}" "${IMAGE}" > instructions.txt

      - name: Upload build instructions
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-instructions
          path: instructions.txt
          retention-days: 90
          if-no-files-found: error
